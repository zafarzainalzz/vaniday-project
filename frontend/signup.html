<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page signup-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>

    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>

        <h2>Start your Vaniday glow</h2>

        <p>
            Create your space for bookings, rewards, beauty merchants, and calm self-care planning.
        </p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Create Account</h1>

        <input id="signupName" type="text" placeholder="Full Name" required>

        <input id="signupEmail" type="email" placeholder="Enter Email" required>

        <input id="signupPassword" type="password" placeholder="Enter Password" required>

        <select id="signupRole">

            <option>Customer</option>

            <option>Shop Owner</option>

        </select>

        <button onclick="signupUser()">
            Signup
        </button>

        <p>
            Already have an account?
            <a href="login.html">Login here</a>
        </p>

    </div>

    <script src="app.js"></script>

    <script>
        function signupUser() {
            var fullName = document.getElementById("signupName").value;
            var email = document.getElementById("signupEmail").value;
            var password = document.getElementById("signupPassword").value;
            var role = document.getElementById("signupRole").value;

            if (fullName == "" || email == "" || password == "" || role == "") {
                alert("Please fill in all signup details.");
                return;
            }

            fetch("http://localhost:5000/api/users/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    fullName: fullName,
                    email: email,
                    password: password,
                    role: role
                })
            })
                .then(function (response) {
                    if (response.ok == false) {
                        throw new Error("Signup failed.");
                    }

                    return response.json();
                })
                .then(function (data) {
                    alert("Signup successful. Please login.");
                    window.location.href = "login.html";
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Signup failed. Please check the backend terminal.");
                });
        }
    </script>

</body>

</html>
