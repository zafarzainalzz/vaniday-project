<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page signup-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>


    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>
        <h2>Start your Vaniday glow</h2>
        <p>Create your space for bookings, rewards, beauty merchants, and calm self-care planning.</p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Create Account</h1>

        <input id="signupName" type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Enter Email" required>

        <input type="password" placeholder="Enter Password" required>


        <button onclick="signupUser()">

            Signup

        </button>


        <p>
            Already have an account?
            <a href="login.html">Login here</a>
        </p>

    </div>

    <script src="integration.js"></script>
    <script src="app.js"></script>

    <script>
        function signupUser() {
            var nameInput = document.getElementById('signupName');
            var name = nameInput.value;
            var emailInput = document.querySelector('input[type="email"]');
            var email = emailInput.value;
            var passwordInput = document.querySelector('input[type="password"]');
            var password = passwordInput.value;

            if (name == '' || email == '' || password == '') {
                alert('Please fill in all fields.');
                return;
            }

            fetch('/api/users/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName: name, email: email, password: password })
            })
            .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
            .then(function(result) {
                if (result.ok) {
                    localStorage.setItem('vanidayToken', result.data.token);
                    localStorage.setItem('vanidayName', result.data.fullName);
                    localStorage.setItem('vanidayRole', result.data.role);
                    localStorage.setItem('vanidayUserId', result.data.userId);
                    alert('Signup successful! Redirecting to dashboard.');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Signup failed: ' + result.data.message);
                }
            })
            .catch(function(err) {
                alert('Signup error: ' + err.message);
            });
        }
    </script>

</body>

</html>
