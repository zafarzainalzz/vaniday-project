<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

    <script src="integration.js"></script>

</head>

<body class="auth-page signup-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>


    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>
        <h2>Start your Vaniday glow</h2>
        <p>Create your space for bookings, rewards, beauty merchants, and calm self-care planning.</p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Create Account</h1>

        <input id="signupName" type="text" placeholder="Full Name" required>

        <input id="signupEmail" type="email" placeholder="Enter Email" required>

        <input id="signupPassword" type="password" placeholder="Enter Password" required>


        <button onclick="signupUser()">

            Signup

        </button>


        <p>
            Already have an account?
            <a href="login.html">Login here</a>
        </p>

    </div>

    <script src="app.js"></script>

    <script>
        async function signupUser() {
            var name = document.getElementById('signupName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;

            if (name == '' || email == '' || password == '') {
                alert('Please enter your full name, email and password.');
                return;
            }

            try {
                var response = await fetch('/api/users/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName: name, email: email, password: password })
                });
                var result = await response.json();
                if (!response.ok) {
                    alert(result.message || 'Signup failed.');
                    return;
                }

                localStorage.setItem('vanidayToken', result.token);
                localStorage.setItem('vanidayUserId', result.userId);
                localStorage.setItem('vanidayName', result.fullName);
                localStorage.setItem('vanidayEmail', result.email);
                localStorage.setItem('vanidayRole', result.role);
                localStorage.setItem('vanidayLoyaltyPoints', String(result.loyaltyPoints || 100));
                if (window.VanidaySync) await window.VanidaySync.importCurrentUserState();

                if (result.role == 'Customer') window.location.href = 'dashboard.html';
                else if (result.role == 'Shop Owner') window.location.href = 'shop-owner-dashboard.html';
                else window.location.href = 'merchant-admin.html';
            } catch (error) {
                alert('Cannot connect to the backend. Start the server and try again.');
            }
        }
    </script>

</body>

</html>
