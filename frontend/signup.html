<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page signup-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>


    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>
        <h2>Start your Vaniday glow</h2>
        <p>Create your space for bookings, rewards, beauty merchants, and calm self-care planning.</p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Create Account</h1>

        <input id="signupName" type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Enter Email" required>

        <input type="password" placeholder="Enter Password" required>


        <select id="signupRole">

            <option>Customer</option>

            <option>Shop Owner</option>


        </select>


        <button onclick="signupUser()">

            Signup

        </button>


        <p>
            Already have an account?
            <a href="login.html">Login here</a>
        </p>

    </div>

    <script>
        function signupUser() {
            var input = document.getElementById('signupName');
            var name = input.value;
            var role = document.getElementById('signupRole').value;

            if (name == '') {
                alert('Please enter your full name.');
            }
            else {
                localStorage.setItem('vanidayName', name);
                localStorage.setItem('vanidayRole', role);

                if (role == 'Customer') {
                    window.location.href = 'dashboard.html';
                }
                else if (role == 'Shop Owner') {
                    window.location.href = 'shop-owner-dashboard.html';
                }
            }
        }
    </script>

    <script src="app.js"></script>
</body>

</html>
