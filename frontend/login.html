<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page login-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>

    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>

        <h2>Welcome back to Vaniday</h2>

        <p>
            Your next appointment, glow session, and wellness moment are just one click away.
        </p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Login</h1>

        <input id="loginName" type="text" placeholder="Enter Name or Email" required>

        <input type="password" placeholder="Enter Password" required>

        <select id="loginRole">

            <option>Customer</option>

            <option>Shop Owner</option>

        </select>

        <button onclick="loginUser()">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="signup.html">Signup here</a>
        </p>

    </div>

    <script src="app.js"></script>

    <script>
        function loginUser() {
            var input = document.getElementById('loginName');
            var value = input.value;
            var role = document.getElementById('loginRole').value;
            var passwordInput = document.querySelector('input[type="password"]');
            var password = passwordInput.value;

            if (value == '' || password == '') {
                alert('Please enter your email and password.');
                return;
            }

            fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: value, password: password })
            })
            .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
            .then(function(result) {
                if (result.ok) {
                    var dbRole = result.data.role;
                    localStorage.setItem('vanidayName', result.data.fullName);
                    localStorage.setItem('vanidayRole', dbRole);
                    localStorage.setItem('vanidayUserId', result.data.userId);

                    if (dbRole == 'Customer') {
                        window.location.href = 'dashboard.html';
                    }
                    else if (dbRole == 'Shop Owner') {
                        localStorage.removeItem('ownerAssignedShop');
                        var mappedShop = getOwnerShopName();
                        if (mappedShop != '') {
                            localStorage.setItem('ownerAssignedShop', mappedShop);
                        }
                        window.location.href = 'shop-owner-dashboard.html';
                    }
                    else if (dbRole == 'Admin') {
                        window.location.href = 'merchant-admin.html';
                    }
                } else {
                    alert('Login failed: ' + result.data);
                }
            })
            .catch(function(err) {
                alert('Login error: ' + err.message);
            });
        }

    </script>

</body>

</html>
