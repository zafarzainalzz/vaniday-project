<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page login-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>

    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>

        <h2>Welcome back to Vaniday</h2>

        <p>
            Your next appointment, glow session, and wellness moment are just one click away.
        </p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Login</h1>

        <input id="loginName" type="text" placeholder="Enter Name or Email" required>

        <input type="password" placeholder="Enter Password" required>

        <select id="loginRole">

            <option>Customer</option>

            <option>Shop Owner</option>

            <option>Merchant Admin</option>

        </select>

        <button onclick="loginUser()">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="signup.html">Signup here</a>
        </p>

    </div>

    <script>

        function loginUser() {
            var input = document.getElementById('loginName');
            var value = input.value;
            var role = document.getElementById('loginRole').value;
            var password = document.querySelector('input[type="password"]').value;

            if (value == '') {
                alert('Please enter your name or email.');
                return;
            }

            if (password == '') {
                alert('Please enter your password.');
                return;
            }

            var name = value;
            if (value.indexOf('@') != -1) {
                name = value.substring(0, value.indexOf('@'));
            }

            if (name.toLowerCase() == 'merchant') {
                role = 'Merchant Admin';
            }

            fetch("/api/users/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: value, password: password })
            })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("Login failed.");
                    }
                    return response.json();
                })
                .then(function (data) {
                    localStorage.setItem('vanidayName', data.fullName);
                    localStorage.setItem('vanidayRole', data.role);
                    localStorage.setItem('vanidayUserId', data.userId);
                    localStorage.setItem('vanidayPoints', data.loyaltyPoints);

                    if (data.role == 'Shop Owner') {
                        localStorage.removeItem('ownerAssignedShop');
                    }

                    if (data.role == 'Customer') {
                        window.location.href = 'dashboard.html';
                    }
                    else if (data.role == 'Shop Owner') {
                        window.location.href = 'shop-owner-dashboard.html';
                    }
                    else if (data.role == 'Merchant Admin') {
                        window.location.href = 'merchant-admin.html';
                    }
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Login failed. Check your email and password.");
                });
        }

    </script>

    <script src="app.js"></script>
</body>

</html>
