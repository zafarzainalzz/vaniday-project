<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page login-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>

    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>
        <h2>Welcome back to Vaniday</h2>
        <p>Your next appointment, glow session, and wellness moment are just one click away.</p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Login</h1>

        <form action="http://localhost:3000/api/users/login" method="POST">

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <select name="role">

                <option value="Customer">Customer</option>

                <option value="Shop Owner">Shop Owner</option>

                <option value="Merchant Admin">Merchant Admin</option>

            </select>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="signup.html">Signup here</a>
        </p>

    </div>

</body>

</html>
