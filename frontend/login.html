<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

    <script src="integration.js"></script>

</head>

<body class="auth-page login-page auth-split-page">

    <nav>

        <h1>Vaniday</h1>

        <div>

            <a href="index.html">Home</a>

            <a href="merchants.html">Merchants</a>

            <a href="booking.html">Book</a>

            <a href="my-booking.html">My Bookings</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="login.html">Login</a>

            <a href="signup.html">Signup</a>

        </div>

    </nav>

    <div class="auth-flower-scene">
        <span class="auth-flower f1">✿</span>
        <span class="auth-flower f2">✦</span>
        <span class="auth-flower f3">✽</span>

        <h2>Welcome back to Vaniday</h2>

        <p>
            Your next appointment, glow session, and wellness moment are just one click away.
        </p>
    </div>

    <div class="form-container auth-side-card">

        <h1>Login</h1>

        <input id="loginName" type="email" placeholder="Enter Email" required>

        <input id="loginPassword" type="password" placeholder="Enter Password" required>

        <button onclick="loginUser()">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="signup.html">Signup here</a>
        </p>

    </div>

    <script src="app.js"></script>

    <script>

        async function loginUser() {
            var email = document.getElementById('loginName').value.trim();
            var password = document.getElementById('loginPassword').value;

            if (email == '' || password == '') {
                alert('Please enter your email and password.');
                return;
            }

            try {
                var response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                var result = await response.json();
                if (!response.ok) {
                    alert(result.message || 'Login failed.');
                    return;
                }

                localStorage.setItem('vanidayToken', result.token);
                localStorage.setItem('vanidayUserId', result.userId);
                localStorage.setItem('vanidayName', result.fullName);
                localStorage.setItem('vanidayEmail', result.email);
                localStorage.setItem('vanidayRole', result.role);
                localStorage.setItem('vanidayLoyaltyPoints', String(result.loyaltyPoints || 0));
                if (window.VanidaySync) window.VanidaySync.hydrate();

                if (result.role == 'Customer') window.location.href = 'dashboard.html';
                else if (result.role == 'Shop Owner') window.location.href = 'shop-owner-dashboard.html';
                else window.location.href = 'merchant-admin.html';
            } catch (error) {
                alert('Cannot connect to the backend. Start the server and try again.');
            }
        }

    </script>

</body>

</html>
