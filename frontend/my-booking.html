<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .toast-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: #1a1a2e;
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            max-width: 400px;
            font-size: 14px;
            text-align: center;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
    </style>
</head>

<body class="my-booking-page">

    <nav>
        <h1>Vaniday</h1>

        <div>
            <a href="index.html">Home</a>
            <a href="merchants.html">Merchants</a>
            <a href="booking.html">Book</a>
            <a href="my-booking.html">My Bookings</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
        </div>
    </nav>

    <h1 class="page-title">
        My Bookings
    </h1>

    <div id="bookingDetails" class="premium-booking-card">
        <h2>No Booking Found</h2>
        <p>Please book an appointment first.</p>
    </div>

    <script>
        function showToast(message) {
            var toast = document.getElementById('toastNotification');
            if (toast == null) {
                return;
            }
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(function () {
                toast.classList.remove('show');
            }, 3000);
        }

        function loadBookingDetails() {
            var allBookingsText = localStorage.getItem("allBookings");
            var output = "";

            if (allBookingsText != null && allBookingsText != "") {
                var allBookings = JSON.parse(allBookingsText);

                if (allBookings.length > 0) {
                    output = "<h2>All Upcoming Bookings</h2>";

                    for (var i = 0; i < allBookings.length; i = i + 1) {
                        output = output + "<div class='single-booking-box'>";
                        output = output + "<div class='gold-success-tick'><span>✓</span></div>";
                        output = output + "<div class='booking-status-pill'>Status: Confirmed</div>";
                        output = output + "<div class='premium-booking-lines'>";
                        output = output + "<p><b>Booking:</b> " + (i + 1) + "</p>";
                        output = output + "<p><b>Customer:</b> " + allBookings[i].customer + "</p>";
                        output = output + "<p><b>Merchant:</b> " + allBookings[i].merchant + "</p>";
                        output = output + "<p><b>Service:</b> " + allBookings[i].service + "</p>";
                        output = output + "<p><b>Date:</b> " + allBookings[i].date + "</p>";
                        output = output + "<p><b>Time:</b> " + allBookings[i].time + "</p>";
                        output = output + "</div>";
                        output = output + "<div class='premium-booking-actions'>";
                        output = output + "<button onclick='cancelBooking(" + i + ")'>Cancel</button>";
                        output = output + "<button onclick='rescheduleBooking()'>Reschedule</button>";
                        output = output + "</div>";
                        output = output + "</div>";
                    }

                    document.getElementById("bookingDetails").innerHTML = output;
                }
            }
        }

        function deductBookingLoyaltyPoints() {
            var pts = parseInt(localStorage.getItem('vanidayLoyaltyPoints')) || 100;
            if (pts >= 200) { pts = pts - 100; }
            localStorage.setItem('vanidayLoyaltyPoints', pts);
        }

        function cancelBooking(bookingNumber) {
            var allBookingsText = localStorage.getItem("allBookings");

            if (allBookingsText != null && allBookingsText != "") {
                var allBookings = JSON.parse(allBookingsText);
                var cancelledBooking = allBookings[bookingNumber];
                var hadLoyaltyAwarded = false;

                if (cancelledBooking != null && cancelledBooking.loyaltyAwarded === true) {
                    hadLoyaltyAwarded = true;
                    deductBookingLoyaltyPoints();
                }

                allBookings.splice(bookingNumber, 1);
                localStorage.setItem("allBookings", JSON.stringify(allBookings));

                if (allBookings.length == 0) {
                    localStorage.removeItem("customerName");
                    localStorage.removeItem("merchant");
                    localStorage.removeItem("service");
                    localStorage.removeItem("bookingDate");
                    localStorage.removeItem("bookingTime");
                }
                else {
                    var lastBooking = allBookings[allBookings.length - 1];
                    localStorage.setItem("customerName", lastBooking.customer);
                    localStorage.setItem("merchant", lastBooking.merchant);
                    localStorage.setItem("service", lastBooking.service);
                    localStorage.setItem("bookingDate", lastBooking.date);
                    localStorage.setItem("bookingTime", lastBooking.time);
                }

                if (hadLoyaltyAwarded) {
                    showToast("Booking cancelled. 100 loyalty points deducted.");
                }
                else {
                    showToast("Booking cancelled.");
                }
            }

            setTimeout(function () {
                window.location.href = "my-booking.html";
            }, 1500);
        }

        function rescheduleBooking() {
            window.location.href = "booking.html";
        }
    
        function protectCustomerPage() {
            var savedRole = localStorage.getItem('vanidayRole');

            if (savedRole == 'Shop Owner') {
                window.location.href = 'shop-owner-dashboard.html';
            }
            else if (savedRole == 'Merchant Admin' || savedRole == 'Admin') {
                window.location.href = 'merchant-admin.html';
            }
        }

        protectCustomerPage();
        loadBookingDetails();
</script>
    <div id="toastNotification" class="toast-notification"></div>
</body>

</html>
