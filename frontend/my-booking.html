<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="my-booking-page">

    <nav>
        <h1>Vaniday</h1>

        <div>
            <a href="index.html">Home</a>
            <a href="merchants.html">Merchants</a>
            <a href="booking.html">Book</a>
            <a href="my-booking.html">My Bookings</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
        </div>
    </nav>

    <h1 class="page-title">
        My Bookings
    </h1>

    <div id="bookingDetails" class="card">
        <h2>No Booking Found</h2>
        <p>Please book an appointment first.</p>
    </div>

    <script>
        var customerName = localStorage.getItem("customerName");
        var merchant = localStorage.getItem("merchant");
        var service = localStorage.getItem("service");
        var bookingDate = localStorage.getItem("bookingDate");
        var bookingTime = localStorage.getItem("bookingTime");

        if (customerName != null && merchant != null && service != null && bookingDate != null && bookingTime != null) {

            document.getElementById("bookingDetails").innerHTML =
                "<h2>Upcoming Booking</h2>" +
                "<p><b>Customer:</b> " + customerName + "</p>" +
                "<p><b>Merchant:</b> " + merchant + "</p>" +
                "<p><b>Service:</b> " + service + "</p>" +
                "<p><b>Date:</b> " + bookingDate + "</p>" +
                "<p><b>Time:</b> " + bookingTime + "</p>" +
                "<button onclick='cancelBooking()'>Cancel</button>" +
                "<button onclick='rescheduleBooking()'>Reschedule</button>";
        }

        function cancelBooking() {
            localStorage.removeItem("customerName");
            localStorage.removeItem("merchant");
            localStorage.removeItem("service");
            localStorage.removeItem("bookingDate");
            localStorage.removeItem("bookingTime");
            alert("Booking cancelled");
            window.location.href = "my-booking.html";
        }

        function rescheduleBooking() {
            window.location.href = "booking.html";
        }
    
        function protectCustomerPage() {
            var savedRole = localStorage.getItem('vanidayRole');

            if (savedRole == 'Shop Owner') {
                window.location.href = 'shop-owner-dashboard.html';
            }
            else if (savedRole == 'Merchant Admin') {
                window.location.href = 'merchant-admin.html';
            }
        }

        protectCustomerPage();
</script>

    <script src="app.js"></script>
</body>

</html>
