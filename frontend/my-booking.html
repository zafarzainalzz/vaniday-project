<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .toast-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: #1a1a2e;
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            max-width: 400px;
            font-size: 14px;
            text-align: center;
        }

        .toast-notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
    </style>
</head>

<body class="my-booking-page">

    <nav>
        <h1>Vaniday</h1>

        <div>
            <a href="index.html">Home</a>
            <a href="merchants.html">Merchants</a>
            <a href="booking.html">Book</a>
            <a href="my-booking.html">My Bookings</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
        </div>
    </nav>

    <h1 class="page-title">
        My Bookings
    </h1>

    <div id="bookingDetails" class="premium-booking-card">
        <h2>No Booking Found</h2>
        <p>Please book an appointment first.</p>
    </div>

    <script src="integration.js"></script>
    <script src="app.js"></script>
    <script>
        function showToast(message) {
            var toast = document.getElementById('toastNotification');
            if (toast == null) return;
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(function () {
                toast.classList.remove('show');
            }, 3000);
        }

        function loadBookingDetails() {
            var token = localStorage.getItem('vanidayToken');

            if (!token) {
                document.getElementById("bookingDetails").innerHTML =
                    '<h2>Please Log In</h2><p>You need to be logged in to view your bookings. <a href="login.html">Login here</a></p>';
                return;
            }

            fetch('/api/bookings/mine', {
                method: 'GET',
                headers: getAuthHeaders()
            })
            .then(function(res) { return res.json(); })
            .then(function(bookings) {
                if (bookings.length > 0) {
                    var output = "<h2>All Upcoming Bookings</h2>";

                    for (var i = 0; i < bookings.length; i = i + 1) {
                        var b = bookings[i];
                        var merchantName = b.merchant ? b.merchant.name : 'Unknown';
                        var serviceName = b.service ? b.service.name : 'Unknown';
                        var customerName = b.customer ? b.customer.fullName : 'Unknown';

                        output = output + "<div class='single-booking-box'>";
                        output = output + "<div class='gold-success-tick'><span>&#10003;</span></div>";
                        output = output + "<div class='booking-status-pill'>Status: " + b.status + "</div>";
                        output = output + "<div class='premium-booking-lines'>";
                        output = output + "<p><b>Booking:</b> " + (i + 1) + "</p>";
                        output = output + "<p><b>Customer:</b> " + customerName + "</p>";
                        output = output + "<p><b>Merchant:</b> " + merchantName + "</p>";
                        output = output + "<p><b>Service:</b> " + serviceName + "</p>";
                        output = output + "<p><b>Date:</b> " + b.bookingDate + "</p>";
                        output = output + "<p><b>Time:</b> " + b.bookingTime + "</p>";
                        output = output + "</div>";
                        output = output + "<div class='premium-booking-actions'>";
                        output = output + "<button onclick='cancelBooking(\"" + b._id + "\")'>Cancel</button>";
                        output = output + "<button onclick='rescheduleBooking()'>Reschedule</button>";
                        output = output + "</div>";
                        output = output + "</div>";
                    }

                    document.getElementById("bookingDetails").innerHTML = output;
                } else {
                    document.getElementById("bookingDetails").innerHTML =
                        '<h2>No Bookings Found</h2><p>You have no upcoming bookings. <a href="booking.html">Book now</a></p>';
                }
            })
            .catch(function(err) {
                document.getElementById("bookingDetails").innerHTML =
                    '<h2>Error Loading Bookings</h2><p>' + err.message + '</p>';
            });
        }

        function cancelBooking(bookingId) {
            var confirmCancel = confirm('Are you sure you want to cancel this booking?');
            if (!confirmCancel) return;

            fetch('/api/bookings/' + bookingId + '/cancel', {
                method: 'PUT',
                headers: getAuthHeaders()
            })
            .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
            .then(function(result) {
                if (result.ok) {
                    showToast("Booking cancelled.");
                    setTimeout(function () {
                        loadBookingDetails();
                    }, 1000);
                } else {
                    alert("Cancel failed: " + result.data.message);
                }
            })
            .catch(function(err) {
                alert("Cancel error: " + err.message);
            });
        }

        function rescheduleBooking() {
            window.location.href = "booking.html";
        }

        function protectCustomerPage() {
            var savedRole = localStorage.getItem('vanidayRole');
            if (savedRole == 'Shop Owner') {
                window.location.href = 'shop-owner-dashboard.html';
            }
            else if (savedRole == 'Merchant Admin' || savedRole == 'Admin') {
                window.location.href = 'merchant-admin.html';
            }
        }

        protectCustomerPage();
        loadBookingDetails();
    </script>
    <div id="toastNotification" class="toast-notification"></div>
</body>

</html>
