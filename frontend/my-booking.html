<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="my-booking-page">

    <nav>
        <h1>Vaniday</h1>

        <div>
            <a href="index.html">Home</a>
            <a href="merchants.html">Merchants</a>
            <a href="booking.html">Book</a>
            <a href="my-booking.html">My Bookings</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
        </div>
    </nav>

    <h1 class="page-title">
        My Bookings
    </h1>

    <div id="bookingDetails">
        <div class="card">
            <h2>No Booking Found</h2>
            <p>Please book an appointment first.</p>
        </div>
    </div>

    <script>
        var bookingDetails = document.getElementById("bookingDetails");

        fetch("http://localhost:5000/api/bookings")
            .then(function (response) {
                return response.json();
            })
            .then(function (bookings) {
                bookingDetails.innerHTML = "";

                if (bookings.length == 0) {
                    bookingDetails.innerHTML =
                        "<h2>No Booking Found</h2>" +
                        "<p>Please book an appointment first.</p>";

                }

                bookings.forEach(function (booking) {
                    bookingDetails.innerHTML =
                        bookingDetails.innerHTML +
                        "<div class='card'>" +
                        "<h2>Upcoming Booking</h2>" +
                        "<p><b>Customer:</b> " + booking.customerName + "</p>" +
                        "<p><b>Merchant:</b> " + booking.merchant + "</p>" +
                        "<p><b>Service:</b> " + booking.service + "</p>" +
                        "<p><b>Date:</b> " + booking.bookingDate + "</p>" +
                        "<p><b>Time:</b> " + booking.bookingTime + "</p>" +
                        "<p><b>Status:</b> " + booking.status + "</p>" +
                        "<button onclick='rescheduleBooking()'>Reschedule</button>" +
                        "</div>";

                });
            })
            .catch(function (error) {
                console.log(error);

                bookingDetails.innerHTML =
                    "<h2>Failed to load bookings</h2>" +
                    "<p>Please check if the backend server is running.</p>";
            });

        function rescheduleBooking() {
            window.location.href = "booking.html";
        }
    </script>
</body>

</html>
