services:
  - type: web
    name: vaniday
    runtime: node
    plan: free
    buildCommand: npm --prefix backend ci
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
